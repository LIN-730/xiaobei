[pytest]
# asyncio 模式 (pytest-asyncio 0.23+ 推荐)
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# 测试路径
testpaths = tests

# 标记
markers =
    slow: 慢速测试 (需要真实数据库)
    integration: 集成测试 (需要数据库连接)
    unit: 纯单元测试 (无外部依赖)
    agent: Agent 相关测试

# 输出
addopts = -v --tb=short --strict-markers
