services:
  postgres:
    image: postgres:16-alpine
    container_name: edu-postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    networks:
      - edu-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: edu-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - edu-network
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:latest
    container_name: edu-chromadb
    expose:
      - "8001"
    volumes:
      - chromadb_data:/chroma/chroma
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"
    networks:
      - edu-network
    restart: unless-stopped

  api:
    build: .
    container_name: edu-api
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - chromadb
    env_file:
      - .env
    networks:
      - edu-network
    restart: unless-stopped

  nginx:
    image: nginx:1.26-alpine
    container_name: edu-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
    networks:
      - edu-network
    restart: unless-stopped

  celery-worker:
    build: .
    container_name: edu-celery-worker
    command: celery -A app.sync.celery_app worker --loglevel=info --concurrency=4
    user: celery
    depends_on:
      - postgres
      - redis
    env_file:
      - .env
    networks:
      - edu-network
    restart: unless-stopped

  celery-beat:
    build: .
    container_name: edu-celery-beat
    command: celery -A app.sync.celery_app beat --loglevel=info
    user: celery
    depends_on:
      - postgres
      - redis
    env_file:
      - .env
    networks:
      - edu-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  chromadb_data:

networks:
  edu-network:
    driver: bridge
